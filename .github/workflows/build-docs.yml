name: Build Documentation

on:
  push:
    branches: [ update-references ]

jobs:
  build-docs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      
    - name: Set up Python
      run: uv python install 3.13
        
    - name: Install dependencies
      run: |
        uv sync --extra dev_build
        
    - name: Convert Sphinx references to mkdocstrings format
      run: |
        uv run python bin/convert_sphinx_to_mkdocstrings.py
        
    - name: Generate graph objects documentation
      run: |
        uv run python bin/generate_graph_objects_docs.py
        
    - name: Build documentation
      run: |
        uv run mkdocs build
        
    - name: Upload documentation artifacts
      uses: actions/upload-artifact@v4
      with:
        name: documentation-site
        path: docs/
        retention-days: 30
        